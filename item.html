<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Property Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    background:white;
    padding:25px;
    max-width:500px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.label{
    font-weight:bold;
}

#qrcode{
    margin-top:20px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Property Details</h2>

<div id="item">
Loading property data...
</div>

<div id="qrcode"></div>

</div>

<script>

// Get PROPERTY NO from URL
const params = new URLSearchParams(window.location.search);
const propertyID = params.get("id");

// Load JSON
fetch("items.json")
.then(function(response){
    return response.json();
})
.then(function(data){

    // Find matching item
    const item = data.find(function(record){
        return record["PROPERTY NO"] === propertyID;
    });

    if(item){

        // Display property details
        document.getElementById("item").innerHTML = `

        <p><span class="label">PROPERTY NO:</span> ${item["PROPERTY NO"]}</p>

        <p><span class="label">ARTICLE & DESCRIPTION:</span><br>
        ${item["ARTICLE & DESCRIPTION"]}</p>

        <p><span class="label">LOCATION:</span>
        ${item["LOCATION"]}</p>

        <p><span class="label">ACCOUNTABLE OFFICER:</span>
        ${item["ACCOUNTABLE OFFICER"]}</p>

        <p><span class="label">DATE ACQUIRED / AMOUNT:</span>
        ${item["DATE ACQUIRED / AMOUNT"]}</p>

        `;

        // Generate QR Code using API (reliable)
        const currentURL = window.location.href;

        document.getElementById("qrcode").innerHTML = `
            <p><b>QR Code:</b></p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(currentURL)}" alt="QR Code">
        `;

    } else {

        document.getElementById("item").innerHTML =
        "Property record not found.";

    }

})
.catch(function(error){

    document.getElementById("item").innerHTML =
    "Error loading property data.";

});

</script>

</body>
</html>
